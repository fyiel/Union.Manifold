<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: 'Geist';
      src: url('../renderer/public/fonts/Geist-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #09090b;
      overflow: hidden;
      font-family: 'Geist', system-ui, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding-bottom: 60px;
    }

    .logo-container {
      position: relative;
      animation: logoBreath 4s ease-in-out infinite;
    }

    .logo {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
    }

    .splash-loading-path {
      stroke: #e4e4e7;
      stroke-width: 18;
      fill: none;
      stroke-dasharray: 5200;
      stroke-dashoffset: 5200;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: splashDraw 2.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .app-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 2px;
    }

    .version {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #52525b;
    }

    .status {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #71717a;
      min-height: 16px;
      transition: all 0.3s ease;
    }

    /* Offline / failure state — red + slightly bolder so "Starting offline."
       reads as a real status change rather than another loading step. */
    .status.status-error {
      color: #f87171;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* Progress Bar */
    .bar-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 35%;
      background: linear-gradient(90deg, 
        rgba(163, 163, 163, 0.9) 0%, 
        #e4e4e7 50%, 
        rgba(163, 163, 163, 0.9) 100%);
      border-radius: 3px;
      animation: progressSlide 2.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      box-shadow: 0 0 12px rgba(228, 228, 231, 0.5);
    }

    @keyframes progressSlide {
      0%   { transform: translateX(-280%); }
      100% { transform: translateX(380%); }
    }

    @keyframes splashDraw {
      0%   { stroke-dashoffset: 5200; fill: transparent; }
      45%  { stroke-dashoffset: 0; fill: transparent; }
      65%  { stroke-dashoffset: 0; fill: #e4e4e7; }
      85%  { stroke-dashoffset: -5200; fill: transparent; }
      100% { stroke-dashoffset: -5200; fill: transparent; }
    }

    @keyframes logoBreath {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-container">

      </svg>
    </div>

    <div class="text-group fade-in" style="animation-delay: 200ms">
      <span class="app-name">UnionCrax.Direct</span>
      <span class="version" id="version">v0.0.0</span>
      <span class="status" id="status">Preparing your workspace...</span>
    </div>
  </div>

  <div class="bar-track">
    <div class="bar-fill"></div>
  </div>

  <script>
    // Version handling
    (function () {
      const versionEl = document.getElementById('version')
      if (!versionEl) return
      const version = new URLSearchParams(window.location.search).get('v')
      if (version) versionEl.textContent = 'v' + version
    })()

    // Optional: Allow updating status from main process. Pass isError=true to
    // render the red "Starting offline." style.
    window.updateStatus = function(text, isError) {
      const statusEl = document.getElementById('status')
      if (!statusEl) return
      statusEl.textContent = text
      statusEl.classList.toggle('status-error', isError === true)
    }
  </script>
</body>
</html>
