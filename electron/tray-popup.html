<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnionCrax.Direct Tray</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: oklch(0.035 0.002 285);
    --card: oklch(0.12 0.002 285);
    --secondary: oklch(0.16 0.002 285);
    --border: oklch(0.16 0.002 285 / 0.5);
    --fg: oklch(0.968 0.001 286);
    --muted: oklch(0.55 0.003 286);
    --destructive: oklch(0.577 0.245 27.325);
    --primary: oklch(1 0 0);
    --radius: 0.625rem;
    --font-sans: "Inter", "Geist", "Segoe UI", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --hover: color-mix(in oklab, var(--fg) 7%, transparent);
    --active: color-mix(in oklab, var(--fg) 11%, transparent);
    --green: #4ade80;
    --green-bg: color-mix(in oklab, var(--green) 14%, transparent);
    --red-bg: color-mix(in oklab, var(--destructive) 16%, transparent);
  }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--fg);
    user-select: none;
    -webkit-user-select: none;
    -webkit-app-region: no-drag;
    cursor: default;
    overscroll-behavior: none;
  }

  #popup {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 0 color-mix(in oklab, var(--fg) 5%, transparent) inset;
  }

  .app-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 10px 9px;
    background: linear-gradient(180deg, color-mix(in oklab, var(--secondary) 65%, var(--card)) 0%, var(--card) 100%);
  }

  .app-logo {
    width: 18px;
    height: 18px;
    object-fit: contain;
    flex-shrink: 0;
    display: block;
    opacity: 0.95;
  }

  .app-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .app-version {
    font-size: 10px;
    color: var(--muted);
  }

  .sep {
    height: 1px;
    background: var(--border);
  }

  .section {
    padding: 3px 0;
  }

  .sec-label {
    padding: 5px 10px 4px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .running-card {
    display: grid;
    grid-template-columns: 58px 1fr;
    gap: 10px;
    margin: 4px 6px 0;
    padding: 8px;
    border-radius: calc(var(--radius) - 2px);
    background: linear-gradient(180deg, color-mix(in oklab, var(--secondary) 72%, transparent), transparent), var(--green-bg);
    border: 1px solid color-mix(in oklab, var(--green) 20%, var(--border));
  }

  .running-art,
  .game-thumb {
    background: color-mix(in oklab, var(--secondary) 70%, transparent);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .running-art {
    width: 58px;
    height: 58px;
    border-radius: 10px;
  }

  .game-thumb {
    width: 42px;
    height: 42px;
    border-radius: 9px;
  }

  .running-art img,
  .game-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .art-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    background: linear-gradient(135deg, color-mix(in oklab, var(--secondary) 84%, transparent), transparent);
  }

  .art-fallback svg {
    width: 14px;
    height: 14px;
  }

  .playing-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }

  .playing-dot {
    width: 5px;
    height: 5px;
    border-radius: 999px;
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .playing-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
  }

  .playing-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 7px;
    display: -webkit-box;
    line-clamp: 2;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .playing-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .mini-row {
    display: flex;
    align-items: center;
    gap: 7px;
    min-height: 28px;
    padding: 0 8px;
    border-radius: 8px;
    background: color-mix(in oklab, var(--card) 82%, transparent);
    border: 1px solid color-mix(in oklab, var(--border) 80%, transparent);
    cursor: pointer;
  }

  .mini-row:hover { background: var(--hover); }
  .mini-row:active { background: var(--active); }

  .mini-row.danger {
    color: var(--destructive);
    background: color-mix(in oklab, var(--destructive) 10%, transparent);
  }

  .mini-row svg {
    width: 13px;
    height: 13px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 9px;
    min-height: 44px;
    padding: 0 8px;
    margin: 0 3px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 90ms ease;
  }

  .row:hover { background: var(--hover); }
  .row:active { background: var(--active); }

  .row-icon {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    flex-shrink: 0;
  }

  .row-icon svg {
    width: 14px;
    height: 14px;
    transition: transform 150ms ease, opacity 150ms ease;
  }

  .row:hover .row-icon svg,
  .mini-row:hover svg {
    transform: translateY(-1px) scale(1.06);
  }

  .row[data-icon="downloads"].active .row-icon svg {
    animation: bob 1.15s ease-in-out infinite;
  }

  .row[data-icon="settings"]:hover .row-icon svg {
    animation: spin 0.9s linear;
  }

  .row[data-icon="browse"]:hover .row-icon svg {
    transform: scale(1.08) rotate(-6deg);
  }

  .row-copy {
    min-width: 0;
    flex: 1;
  }

  .row-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.2;
  }

  .row-subtle {
    margin-top: 2px;
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    background: color-mix(in oklab, var(--secondary) 82%, transparent);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 6px;
  }

  .row.dest .row-icon,
  .row.dest .row-label,
  .mini-row.danger {
    color: var(--destructive);
  }

  .row.dest:hover { background: var(--red-bg); }
  .row.dest:active { background: color-mix(in oklab, var(--destructive) 18%, transparent); }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
    50% { opacity: 0.42; box-shadow: none; }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(1px); }
  }
</style>
</head>
<body>
<div id="popup"></div>
<script>
const IC = {
  stop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`,
  open: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
  show: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 3v18"/></svg>`,
  library: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
  browse: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  dl: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  quit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
}

let didReportReady = false

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
}

function encodePayload(value) {
  return encodeURIComponent(String(value ?? ''))
}

function applyTheme(theme) {
  if (!theme || typeof theme !== 'object') return
  const root = document.documentElement
  root.style.setProperty('--bg', theme.background || 'oklch(0.035 0.002 285)')
  root.style.setProperty('--card', theme.card || 'oklch(0.12 0.002 285)')
  root.style.setProperty('--secondary', theme.secondary || 'oklch(0.16 0.002 285)')
  root.style.setProperty('--border', theme.border || 'oklch(0.16 0.002 285 / 0.5)')
  root.style.setProperty('--fg', theme.foreground || 'oklch(0.968 0.001 286)')
  root.style.setProperty('--muted', theme.muted || 'oklch(0.55 0.003 286)')
  root.style.setProperty('--destructive', theme.destructive || 'oklch(0.577 0.245 27.325)')
  root.style.setProperty('--primary', theme.primary || 'oklch(1 0 0)')
  root.style.setProperty('--radius', theme.radius || '0.625rem')
  root.style.setProperty('--font-sans', theme.fontSans || '"Inter", "Geist", "Segoe UI", ui-sans-serif, system-ui, -apple-system, sans-serif')
}

function icon(svg) {
  return `<span class="row-icon">${svg}</span>`
}

function imageMarkup(url, cls) {
  if (url) {
    return `<div class="${cls}"><img src="${esc(url)}" alt="" draggable="false"><div class="art-fallback" style="display:none">${IC.clock}</div></div>`
  }
  return `<div class="${cls}"><div class="art-fallback">${IC.clock}</div></div>`
}

function row({ cls = '', svg, label, sublabel = '', action, payload, badge = null, iconName = '', image = null }) {
  const badgeHtml = badge ? `<span class="badge">${esc(badge)}</span>` : ''
  const imageHtml = image ? imageMarkup(image, 'game-thumb') : icon(svg)
  const sub = sublabel ? `<div class="row-subtle">${esc(sublabel)}</div>` : ''
  return `<div class="row ${cls}" data-action="${esc(action)}" data-payload="${encodePayload(payload)}" data-icon="${esc(iconName)}">${imageHtml}<div class="row-copy"><div class="row-label">${esc(label)}</div>${sub}</div>${badgeHtml}</div>`
}

function sep() {
  return '<div class="sep"></div>'
}

function render(data) {
  applyTheme(data?.theme)

  const { running, recentGames, activeDownloads, appVersion } = data || {}
  const popup = document.getElementById('popup')
  const version = appVersion ? `v${appVersion}` : ''
  const recent = (recentGames || []).filter((game) => !running || game.appid !== running.appid).slice(0, 5)

  let html = ''
  html += `<div class="app-header">`
  html += `<img class="app-logo" src="../assets/icons/32x32.png" alt="" draggable="false" onerror="this.style.display='none'">`
  html += `<span class="app-name">UnionCrax.Direct</span>`
  if (version) html += `<span class="app-version">${esc(version)}</span>`
  html += `</div>`

  if (running && running.appid) {
    const runningName = running.gameName || running.name || running.appid
    html += sep()
    html += `<div class="section">`
    html += `<div class="running-card">`
    html += imageMarkup(running.image, 'running-art')
    html += `<div>`
    html += `<div class="playing-header"><div class="playing-dot"></div><span class="playing-label">Now Playing</span></div>`
    html += `<div class="playing-name" title="${esc(runningName)}">${esc(runningName)}</div>`
    html += `<div class="playing-actions">`
    html += `<div class="mini-row" data-action="open-game" data-payload="${encodePayload(running.appid)}">${IC.open}<span>Open game page</span></div>`
    html += `<div class="mini-row danger" data-action="quit-game" data-payload="${encodePayload(running.appid)}">${IC.stop}<span>Quit game</span></div>`
    html += `</div>`
    html += `</div>`
    html += `</div>`
    html += `</div>`
  }

  if (recent.length > 0) {
    html += sep()
    html += `<div class="section">`
    html += `<div class="sec-label">Recently Played</div>`
    for (const game of recent) {
      html += row({
        label: game.name || game.appid,
        sublabel: 'Launch game',
        action: 'launch-game',
        payload: game.appid,
        iconName: 'recent',
        image: game.image || null,
        svg: IC.clock,
      })
    }
    html += `</div>`
  }

  html += sep()
  html += `<div class="section">`
  html += row({ svg: IC.show, label: 'Show UnionCrax.Direct', action: 'show', payload: '', iconName: 'show' })
  html += row({ svg: IC.library, label: 'Library', action: 'navigate', payload: '/library', iconName: 'library' })
  html += row({ svg: IC.browse, label: 'Browse', action: 'navigate', payload: '/', iconName: 'browse' })
  html += row({ svg: IC.dl, label: 'Downloads', action: 'navigate', payload: '/downloads', badge: activeDownloads > 0 ? String(activeDownloads) : null, iconName: 'downloads', cls: activeDownloads > 0 ? 'active' : '' })
  html += row({ svg: IC.settings, label: 'Settings', action: 'navigate', payload: '/settings', iconName: 'settings' })
  html += `</div>`

  html += sep()
  html += `<div class="section">`
  html += row({ svg: IC.quit, label: 'Quit UnionCrax.Direct', action: 'quit', payload: '', iconName: 'quit', cls: 'dest' })
  html += `</div>`

  popup.innerHTML = html

  if (!didReportReady) {
    didReportReady = true
    requestAnimationFrame(() => {
      window.trayAPI.ready(document.documentElement.scrollHeight)
    })
  }
}

document.addEventListener('click', (event) => {
  const target = event.target.closest('.row, .mini-row')
  if (!target) return
  const payload = target.dataset.payload ? decodeURIComponent(target.dataset.payload) : null
  window.trayAPI.action(target.dataset.action, payload || null)
})

window.trayAPI.onData(render)
</script>
</body>
</html>
